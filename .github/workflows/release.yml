name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "バージョン番号 (例: 1.2.3 または v1.2.3)。空欄の場合は最新タグのパッチバージョンを自動インクリメント"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Resolve tag
        id: resolve
        run: |
          INPUT="${{ inputs.tag }}"
          if [[ -n "$INPUT" ]]; then
            # 先頭の v を除去して正規化
            NORMALIZED="${INPUT#v}"
            if [[ ! "$NORMALIZED" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: バージョンは 1.2.3 の形式で入力してください"
              exit 1
            fi
            echo "tag=v${NORMALIZED}" >> "$GITHUB_OUTPUT"
          else
            # 入力なしの場合: 最新タグのパッチバージョンをインクリメント
            LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [[ -z "$LATEST" ]]; then
              NEXT="v0.0.1"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
            echo "最新タグ: ${LATEST:-なし} → 新タグ: $NEXT"
            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Error: タグ $TAG は既に存在します"
            exit 1
          fi

      - name: Create and push tag
        id: tag
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: create-tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: StampCSV-linux-amd64
          - os: windows-latest
            artifact: StampCSV-windows-amd64.exe
          - os: macos-latest
            artifact: StampCSV-darwin-amd64
          - os: macos-latest
            artifact: StampCSV-darwin-arm64
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go build -o ${{ matrix.artifact }} .

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: go build -ldflags "-H windowsgui" -o ${{ matrix.artifact }} .

      - name: Build (macOS amd64)
        if: matrix.os == 'macos-latest' && matrix.goarch == ''
        run: go build -o ${{ matrix.artifact }} .

      - name: Build (macOS arm64)
        if: matrix.os == 'macos-latest' && matrix.goarch == 'arm64'
        env:
          GOARCH: arm64
        run: go build -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build, create-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
