name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "リリースタグ (例: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: タグは v1.2.3 の形式で入力してください"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "${{ inputs.tag }}" | grep -q "${{ inputs.tag }}"; then
            echo "Error: タグ ${{ inputs.tag }} は既に存在します"
            exit 1
          fi

      - name: Create and push tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: create-tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: StampCSV-linux-amd64
          - os: windows-latest
            artifact: StampCSV-windows-amd64.exe
          - os: macos-latest
            artifact: StampCSV-darwin-amd64
          - os: macos-latest
            artifact: StampCSV-darwin-arm64
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go build -o ${{ matrix.artifact }} .

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: go build -ldflags "-H windowsgui" -o ${{ matrix.artifact }} .

      - name: Build (macOS amd64)
        if: matrix.os == 'macos-latest' && matrix.goarch == ''
        run: go build -o ${{ matrix.artifact }} .

      - name: Build (macOS arm64)
        if: matrix.os == 'macos-latest' && matrix.goarch == 'arm64'
        env:
          GOARCH: arm64
        run: go build -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/*
          generate_release_notes: true
